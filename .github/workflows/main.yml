name: Windows RDP

on: [push]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Download ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "YourPassword123!" -Force)

      - name: Start ngrok tunnel
        run: |
          .\ngrok\ngrok.exe tcp 3389 &
          Start-Sleep -Seconds 5
          $tunnel = Invoke-RestMethod http://localhost:4040/api/tunnels
          Write-Host "RDP Address: $($tunnel.tunnels[0].public_url)"

      - name: Keep alive
        run: Start-Sleep -Seconds 21600
